<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>CoursePilot Dashboard</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            text-align: center;
            padding: 60px 20px;
        }

        .card {
            background: white;
            width: 500px;
            max-width: 90%;
            margin: auto;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
        }

        h1 {
            color: #1b5e20;
        }

        input {
            box-sizing: border-box;
            width: 100%;
            padding: 12px;
            margin-top: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 16px;
        }

        button {
            background: #1b5e20;
            color: white;
            border: none;
            padding: 12px 22px;
            margin-top: 18px;
            border-radius: 7px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            opacity: 0.85;
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .booking {
            background: #f1f1f1;
            padding: 20px;
            margin-top: 20px;
            border-radius: 10px;
            text-align: left;
        }

        .message {
            margin-top: 15px;
        }

        .error {
            color: #b00020;
        }

        .manager-bar {
            margin-bottom: 25px;
        }

        .manager-email {
            margin-bottom: 0;
            color: #555;
        }

        #logoutButton {
            background: #555;
        }
    </style>
</head>

<body>

<div class="card">

    <h1>CoursePilot Dashboard</h1>

    <section id="loginSection">

        <h2>Manager Login</h2>

        <form id="loginForm">

            <input
                id="emailInput"
                type="email"
                placeholder="Manager email"
                autocomplete="email"
                required
            >

            <input
                id="passwordInput"
                type="password"
                placeholder="Password"
                autocomplete="current-password"
                required
            >

            <button id="loginButton" type="submit">
                Log In
            </button>

        </form>

        <p id="loginMessage" class="message"></p>

    </section>

    <section id="dashboardSection" hidden>

        <div class="manager-bar">

            <p id="managerEmail" class="manager-email"></p>

            <button id="logoutButton" type="button">
                Log Out
            </button>

        </div>

        <h2>Booking Requests</h2>

        <div id="booking">
            Loading bookings...
        </div>

    </section>

</div>

<script type="module">

    import { supabase } from "./supabase.js";

    const loginSection =
        document.getElementById("loginSection");

    const dashboardSection =
        document.getElementById("dashboardSection");

    const loginForm =
        document.getElementById("loginForm");

    const emailInput =
        document.getElementById("emailInput");

    const passwordInput =
        document.getElementById("passwordInput");

    const loginButton =
        document.getElementById("loginButton");

    const loginMessage =
        document.getElementById("loginMessage");

    const managerEmail =
        document.getElementById("managerEmail");

    const logoutButton =
        document.getElementById("logoutButton");

    const bookingArea =
        document.getElementById("booking");


    function showLogin() {
        loginSection.hidden = false;
        dashboardSection.hidden = true;

        managerEmail.textContent = "";
        loginForm.reset();
    }


    function showDashboard(email) {
        loginSection.hidden = true;
        dashboardSection.hidden = false;

        managerEmail.textContent =
            `Signed in as ${email}`;

        renderTemporaryBooking();
    }


    function addBookingField(container, label, value) {
        const paragraph = document.createElement("p");
        const strong = document.createElement("strong");

        strong.textContent = `${label}: `;
        paragraph.appendChild(strong);
        paragraph.appendChild(
            document.createTextNode(value || "Not provided")
        );

        container.appendChild(paragraph);
    }


    function renderTemporaryBooking() {
        bookingArea.replaceChildren();

        const savedBooking =
            localStorage.getItem("booking");

        if (!savedBooking) {
            bookingArea.textContent =
                "No booking requests yet.";

            return;
        }

        try {
            const booking =
                JSON.parse(savedBooking);

            const bookingCard =
                document.createElement("div");

            bookingCard.className = "booking";

            addBookingField(
                bookingCard,
                "Name",
                booking.name
            );

            addBookingField(
                bookingCard,
                "Day",
                booking.day
            );

            addBookingField(
                bookingCard,
                "Time",
                booking.time
            );

            addBookingField(
                bookingCard,
                "Players",
                booking.players
            );

            bookingArea.appendChild(bookingCard);
        } catch (error) {
            console.error(
                "Could not read temporary booking:",
                error
            );

            bookingArea.textContent =
                "The saved booking could not be displayed.";
        }
    }


    async function handleLogin(event) {
        event.preventDefault();

        const email =
            emailInput.value.trim();

        const password =
            passwordInput.value;

        loginButton.disabled = true;
        loginMessage.className = "message";
        loginMessage.textContent = "Signing in...";

        try {
            const { data, error } =
                await supabase.auth.signInWithPassword({
                    email,
                    password
                });

            if (error) {
                loginMessage.className =
                    "message error";

                loginMessage.textContent =
                    "Login failed. Check your email and password.";

                console.error(
                    "Supabase login error:",
                    error
                );

                return;
            }

            loginMessage.textContent = "";

            showDashboard(
                data.user.email || email
            );
        } catch (error) {
            console.error(
                "Unexpected login error:",
                error
            );

            loginMessage.className =
                "message error";

            loginMessage.textContent =
                "An unexpected login error occurred.";
        } finally {
            loginButton.disabled = false;
        }
    }


    async function handleLogout() {
        logoutButton.disabled = true;

        try {
            const { error } =
                await supabase.auth.signOut();

            if (error) {
                console.error(
                    "Supabase logout error:",
                    error
                );

                return;
            }

            showLogin();
        } finally {
            logoutButton.disabled = false;
        }
    }


    async function initializeDashboard() {
        const { data, error } =
            await supabase.auth.getSession();

        if (error) {
            console.error(
                "Could not check login session:",
                error
            );

            showLogin();
            return;
        }

        if (data.session) {
            showDashboard(
                data.session.user.email ||
                "Manager"
            );

            return;
        }

        showLogin();
    }


    loginForm.addEventListener(
        "submit",
        handleLogin
    );

    logoutButton.addEventListener(
        "click",
        handleLogout
    );

    initializeDashboard();

</script>

</body>
</html>
